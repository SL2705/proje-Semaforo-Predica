<ion-header [translucent]="true">
</ion-header>

<ion-content [fullscreen]="true">
  
  <app-background-layout></app-background-layout>

  <div class="operator-wrapper">
    <div class="main-split-container">

      <div class="side-panel-left">
        <div class="logo-box">
          <img src="assets/img/logo.png" alt="Logo">
        </div>

        <h2 class="panel-title">Registro de Personal</h2>
        <p class="panel-description">
          Ingresa los datos del nuevo usuario y asigna su rol dentro del sistema.
        </p>
      </div>

      <div class="operator-card">
        <div class="page-container">

          <div class="welcome-header text-center">
            <h1 class="user-name">Registrar Nuevo Usuario</h1>
          </div>

          <form class="register-form" (ngSubmit)="registrar()">

            <div class="input-group">
              <label class="input-label">Rol del Empleado</label>
              <select class="custom-select" [(ngModel)]="rol" name="rol">
                <option value="operador">Operador de Producción</option>
                <option value="jefe_grupo">Jefe de Grupo</option>
                <option value="supervisor">Supervisor de Línea</option>
                <option value="rrhh">Recursos Humanos</option>
                <option value="sistemas">Sistemas</option>
              </select>
            </div>

            <div class="input-row">
              <div class="input-group">
                <label class="input-label">Nombre Completo</label>
                <input
                  type="text"
                  class="custom-input-field"
                  placeholder="Ejemplo: Juan Pérez"
                  [(ngModel)]="nombre"
                  name="nombre">
              </div>

              <div class="input-group">
                <label class="input-label">ID / Núm. Reloj</label>
                <input
                  type="number"
                  class="custom-input-field"
                  placeholder="26519"
                  [(ngModel)]="numero_reloj"
                  name="numero_reloj">
              </div>
            </div>

            <div class="input-group">
              <label class="input-label" [class.disabled-label]="rol !== 'operador'">
                Línea de Trabajo
              </label>
              <input
                type="text"
                class="custom-input-field"
                placeholder="Ej: Ensamble A"
                [(ngModel)]="linea"
                name="linea"
                [disabled]="rol !== 'operador'">
            </div>

            <div class="input-group">
              <label class="input-label" [class.disabled-label]="rol !== 'supervisor' && rol !== 'jefe_grupo'">
                Líneas a Cargo
              </label>
              <input
                type="text"
                class="custom-input-field"
                placeholder="Ej: A-1, A-2"
                [(ngModel)]="lineasCargo"
                name="lineasCargo"
                [disabled]="rol !== 'supervisor' && rol !== 'jefe_grupo'">
            </div>

            <div class="input-group">
              <label class="input-label" [class.disabled-label]="rol !== 'rrhh' && rol !== 'sistemas'">
                Departamento
              </label>
              <input
                type="text"
                class="custom-input-field"
                placeholder="Ej: Sistemas"
                [(ngModel)]="departamento"
                name="departamento"
                [disabled]="rol !== 'rrhh' && rol !== 'sistemas'">
            </div>

            <div class="input-group">
              <label class="input-label">Contraseña Temporal</label>
              <input
                type="password"
                class="custom-input-field"
                placeholder="••••••••"
                [(ngModel)]="password"
                name="password">
              <p class="helper-text">
                El usuario deberá cambiarla en su primer inicio de sesión.
              </p>
            </div>

            <button type="submit" class="submit-button">
              Crear Cuenta de Empleado
            </button>

          </form>

        </div>
      </div>

    </div>
  </div>

</ion-content>
